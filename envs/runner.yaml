# Environment for running the pipeline itself.
# Install once with:
#   conda env create -f envs/runner.yaml
#   conda activate primer-pipeline
#
# Snakemake will then create per-rule environments automatically
# (entrez, ncbi_download, seqtools, r-primers) when you pass --use-conda.

name: primer-pipeline
channels:
  - conda-forge
  - bioconda
dependencies:
  - snakemake-minimal>=8
